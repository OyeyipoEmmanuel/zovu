version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg15-latest
    container_name: zovu_postgres
    environment:
      POSTGRES_DB: zovu
      POSTGRES_USER: zovu
      POSTGRES_PASSWORD: zovu_password
    ports:
      - "5432:5432"
    volumes:
      - zovu_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zovu"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zovu_redis
    ports:
      - "6379:6379"
    volumes:
      - zovu_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zovu_celery_worker
    command: celery -A src.workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      DATABASE_URL: postgresql+asyncpg://zovu:zovu_password@postgres:5432/zovu
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      SQUAD_SECRET_KEY: ${SQUAD_SECRET_KEY}
      SQUAD_BASE_URL: ${SQUAD_BASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      COHERE_API_KEY: ${COHERE_API_KEY}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY}
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zovu_flower
    command: celery -A src.workers.celery_app flower --port=5555
    environment:
      DATABASE_URL: postgresql+asyncpg://zovu:zovu_password@postgres:5432/zovu
      REDIS_URL: redis://redis:6379
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - celery_worker

volumes:
  zovu_postgres_data:
  zovu_redis_data:

networks:
  default:
    name: zovu_network
