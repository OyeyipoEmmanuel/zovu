services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zovu_api
    command: uvicorn src.main:app --host 0.0.0.0 --port 4000 --reload
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./zovu.db
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      DEBUG: "true"
      CSV_DATA_DIR: /AI-engineer/data
    ports:
      - "4000:4000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../AI-engineer/data:/AI-engineer/data:ro

  redis:
    image: redis:7-alpine
    container_name: zovu_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zovu_celery_worker
    command: celery -A src.workers.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./zovu.db
      REDIS_URL: redis://redis:6379
      ENVIRONMENT: development
      CSV_DATA_DIR: /AI-engineer/data
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - ../AI-engineer/data:/AI-engineer/data:ro